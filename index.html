<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>REWIRE</title>

<!-- PWA: installable + offline -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0a0b">
<meta name="description" content="Forge the mind you want. Habit loops, identity reps, and an anti-doomscroll core.">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REWIRE">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <!-- SIDEBAR / NAV -->
    <aside class="sidebar">
      <div class="brand"><span>REWIRE</span><b class="dot">.</b></div>
      <nav class="nav">
        <a class="nav-item" href="#today" data-route="today">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/></svg>
          <span>Today</span></a>
        <a class="nav-item" href="#reps" data-route="reps">
          <svg viewBox="0 0 24 24"><line x1="8" y1="7" x2="20" y2="7"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="17" x2="20" y2="17"/><circle cx="4" cy="7" r="1.3" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4" cy="17" r="1.3" fill="currentColor" stroke="none"/></svg>
          <span>Reps</span></a>
        <a class="nav-item" href="#resist" data-route="resist">
          <svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/></svg>
          <span>Resist</span></a>
        <a class="nav-item" href="#identity" data-route="identity">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>
          <span>Identity</span></a>
        <a class="nav-item" href="#progress" data-route="progress">
          <svg viewBox="0 0 24 24"><line x1="5" y1="20" x2="5" y2="12"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="19" y1="20" x2="19" y2="9"/></svg>
          <span>Progress</span></a>
      </nav>
      <button id="install-btn" class="install-btn" hidden>Install app</button>
      <div class="side-foot">Forge the mind you want.</div>
    </aside>

    <!-- CONTENT -->
    <main class="content" id="content"></main>
  </div>

  <!-- TOAST -->
  <div id="toast"><div class="tx" id="toast-x">+20</div><div class="tt" id="toast-t">XP</div></div>

  <!-- URGE MODAL -->
  <div id="modal">
    <div class="modal-card">
      <div class="mk-eyebrow">Intercept</div>
      <h2>The feed can wait.</h2>
      <div class="swap" id="modal-swap"></div>
      <p>Two minutes on this beats thirty on the feed. Your brain rewards whichever you repeat.</p>
      <div class="modal-btns">
        <button class="mb-resist" data-action="urge-resist">I did it instead &#10003;</button>
        <button class="mb-gave" data-action="urge-slip">I scrolled</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/pwa.js"></script>
</body>
</html>
